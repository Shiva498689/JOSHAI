name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configure default git identity
          git config --global user.email "123shivadubey@gmail.com"
          git config --global user.name "Haridas498689"
          
          # 2. Force authentication directly into the remote URL without user prompts
          # We use a placeholder username 'user' and pass your secret token cleanly
          git remote add hf https://user:${HF_TOKEN}@huggingface.co/spaces/Haridas498689/joshai_123
          
          # 3. Push cleanly to the main branch
          git push --force hf main

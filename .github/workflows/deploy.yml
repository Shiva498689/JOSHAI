name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "123shivadubey@gmail.com"
          git config --global user.name "Haridas498689"
          
          git config --global http.https://huggingface.co/.extraheader "Authorization: Bearer $HF_TOKEN"
          
          git remote add hf https://huggingface.co/spaces/Haridas498689/joshai_123
          
          git push --force hf main
